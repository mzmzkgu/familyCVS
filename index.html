<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가족 편의점</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj4KICA8cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjgwIiBmaWxsPSIjZmZmZmZmIi8+CiAgPHRleHQgeD0iMjU2IiB5PSIyMTAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNTgiIGZvbnQtd2VpZ2h0PSI5MDAiIGZpbGw9IiM0RkMzRjciIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPu2OuOydmOygkDwvdGV4dD4KICA8dGV4dCB4PSIyNTYiIHk9IjM3MCIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjE1OCIgZm9udC13ZWlnaHQ9IjkwMCIgZmlsbD0iIzRGQzNGNyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZG9taW5hbnQtYmFzZWxpbmU9Im1pZGRsZSI+66mU66qoPC90ZXh0Pgo8L3N2Zz4=">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root {
  --bg: #f5f5f0;
  --bg2: #ebebeb;
  --surface: #ffffff;
  --surface2: #f0f0ea;
  --border: #d8d8d0;
  --text: #1a1a1a;
  --text2: #666660;
  --text3: #999990;
  --accent: #2d6a4f;
  --accent2: #40916c;
  --accent-light: #d8f3dc;
  --red: #e63946;
  --red-light: #fdecea;
  --shadow: rgba(0,0,0,0.08);
  --tab-h: 56px;
  --fs: 1;
}
[data-theme="dark"] {
  --bg: #141414;
  --bg2: #1e1e1e;
  --surface: #242424;
  --surface2: #2e2e2e;
  --border: #3a3a3a;
  --text: #f0f0ea;
  --text2: #aaaaaa;
  --text3: #666660;
  --accent: #52b788;
  --accent2: #74c69d;
  --accent-light: #1b3a2a;
  --red: #ff6b6b;
  --red-light: #2e1a1a;
  --shadow: rgba(0,0,0,0.3);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:-webkit-fill-available}
body{
  height:100vh;height:-webkit-fill-available;
  overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
  font-size:calc(14px * var(--fs));
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
}

#app{
  display:flex;flex-direction:column;
  height:100%;max-width:480px;
  margin:0 auto;background:var(--bg);
  overflow:hidden;
}

/* 탑바 */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 6px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.app-title{font-size:calc(17px * var(--fs));font-weight:900;color:var(--accent);letter-spacing:-0.5px}
.app-title span{color:var(--text);font-weight:400}
.top-actions{display:flex;gap:6px;align-items:center}
.icon-btn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--text);
}
.font-ctrl{display:flex;gap:4px}
.font-ctrl button{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:4px 9px;cursor:pointer;
  font-size:calc(13px * var(--fs));color:var(--text);font-weight:700;
}

/* 탭 */
#tabs{
  display:flex;background:var(--surface);
  border-top:1px solid var(--border);
  flex-shrink:0;height:var(--tab-h);min-height:var(--tab-h);
}
.tab-btn{
  flex:1;border:none;background:transparent;
  color:var(--text3);
  font-family:'Noto Sans KR',sans-serif;
  font-size:calc(13px * var(--fs));font-weight:700;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;position:relative;
}
.tab-btn .ti{font-size:18px}
.tab-btn.active{color:var(--accent)}
.tab-btn.active::after{
  content:'';position:absolute;
  top:0;left:20%;right:20%;height:3px;
  background:var(--accent);border-radius:0 0 4px 4px;
}

/* 콘텐츠 */
#content{flex:1 1 0;min-height:0;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.tab-panel.active{display:flex}

/* 공통 컴포넌트 */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;margin:0 12px 10px;overflow:hidden;
}
.form-row{
  display:flex;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--border);
  gap:10px;min-height:48px;
}
.form-row:last-child{border-bottom:none}
.form-label{font-size:calc(13px * var(--fs));font-weight:700;color:var(--text2);width:52px;flex-shrink:0}
.form-input{
  flex:1;border:none;background:transparent;
  font-family:'Noto Sans KR',sans-serif;
  font-size:calc(14px * var(--fs));color:var(--text);
  outline:none;min-width:0;
}
.form-input::placeholder{color:var(--text3)}
.btn-primary{
  display:block;width:calc(100% - 24px);
  margin:0 12px 10px;padding:14px;
  background:var(--accent);color:#fff;
  border:none;border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:calc(15px * var(--fs));font-weight:700;
  cursor:pointer;letter-spacing:-0.3px;
}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}

/* 등록 탭 */
#camera-area{
  margin:10px 12px 6px;
  background:var(--surface2);
  border:2px dashed var(--border);
  border-radius:14px;overflow:hidden;
  position:relative;flex-shrink:0;height:160px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
#camera-area video{width:100%;height:100%;object-fit:cover;display:none;border-radius:12px}
#camera-area.active video{display:block}
#cam-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;color:var(--text3);
  position:absolute;inset:0;
  text-align:center;
}
#camera-area.active #cam-placeholder{display:none}
#cam-placeholder.after-scan{display:flex !important;background:rgba(0,0,0,0.55);border-radius:12px}
#cam-placeholder.after-scan .ci, #cam-placeholder.after-scan p{color:#fff}
#cam-placeholder .ci{font-size:36px}
#cam-placeholder p{font-size:calc(12px * var(--fs));font-weight:700;text-align:center;width:100%}
#scan-overlay{position:absolute;inset:0;pointer-events:none;display:none}
#camera-area.active #scan-overlay{display:block}
.scan-line{
  position:absolute;left:15%;right:15%;height:2px;
  background:var(--accent);box-shadow:0 0 8px var(--accent);
  animation:scanMove 2s ease-in-out infinite;
}
@keyframes scanMove{0%{top:20%}50%{top:75%}100%{top:20%}}
.sc{position:absolute;width:20px;height:20px;border-color:var(--accent);border-style:solid}
.sc.tl{top:15%;left:15%;border-width:3px 0 0 3px;border-radius:2px 0 0 0}
.sc.tr{top:15%;right:15%;border-width:3px 3px 0 0;border-radius:0 2px 0 0}
.sc.bl{bottom:20%;left:15%;border-width:0 0 3px 3px;border-radius:0 0 0 2px}
.sc.br{bottom:20%;right:15%;border-width:0 3px 3px 0;border-radius:0 0 2px 0}
#scan-status{
  position:absolute;bottom:8px;left:0;right:0;
  text-align:center;font-size:11px;font-weight:700;
  color:rgba(255,255,255,0.85);
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
  pointer-events:none;
}
#focus-ring{
  position:absolute;width:56px;height:56px;
  border:2px solid #fff;border-radius:50%;
  box-shadow:0 0 0 1px rgba(0,0,0,0.4);
  pointer-events:none;opacity:0;
  transform:translate(-50%,-50%) scale(1.3);
  transition:opacity 0.15s,transform 0.25s;
  z-index:10;
}
#focus-ring.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#cam-btn-row{display:flex;gap:8px;padding:0 12px 6px;flex-shrink:0}
.cam-btn{
  flex:1;padding:10px 6px;
  border:1px solid var(--border);background:var(--surface);
  border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:calc(12px * var(--fs));font-weight:700;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.cam-btn.green{background:var(--accent-light);color:var(--accent);border-color:var(--accent2)}
.bc-red{color:var(--red);font-weight:700}
.bc-mid{color:var(--text3)}
.qty-ctrl{display:flex;align-items:center;gap:10px}
.qty-btn{
  width:30px;height:30px;border-radius:8px;
  border:1px solid var(--border);background:var(--surface2);
  font-size:18px;font-weight:700;color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#qty-input{width:50px;text-align:center;font-size:calc(16px * var(--fs));font-weight:700}

/* 기록 탭 */
#records-list{flex:1;overflow-y:auto;padding:6px 0 10px}
.date-group{margin-bottom:6px}
.date-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;margin:0 12px 4px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;user-select:none;
}
.dh-left{display:flex;align-items:center;gap:8px}
.dh-date{font-size:calc(14px * var(--fs));font-weight:700}
.dh-count{
  font-size:calc(11px * var(--fs));
  background:var(--accent-light);color:var(--accent);
  padding:2px 7px;border-radius:10px;font-weight:700;
}
.dh-arrow{color:var(--text3);font-size:14px;transition:transform 0.2s}
.date-header.open .dh-arrow{transform:rotate(180deg)}
.date-items{display:none;padding:0 12px}
.date-items.open{display:block}
.record-item{
  display:flex;align-items:center;
  padding:10px 12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:4px;gap:8px;
}
.ri-bc{font-size:calc(11px * var(--fs));font-weight:700;color:var(--text3);flex-shrink:0}
.ri-name{flex:1;font-size:calc(13px * var(--fs));font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.ri-qty{font-size:calc(13px * var(--fs));font-weight:700;color:var(--accent);flex-shrink:0;min-width:28px;text-align:right}
.edit-btn{
  flex-shrink:0;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;
  padding:3px 8px;font-size:calc(11px * var(--fs));font-weight:700;
  color:var(--text2);cursor:pointer;
}

/* 공유메모 탭 */
#memos-scroll{flex:1;overflow-y:auto;padding:6px 0 0;min-height:0}
.sec-title{font-size:calc(11px * var(--fs));font-weight:700;color:var(--text3);letter-spacing:0.8px;padding:10px 16px 4px}
.memo-item{
  display:flex;align-items:center;
  padding:9px 12px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin:0 12px 4px;gap:8px;
}
.mi-date{font-size:calc(11px * var(--fs));font-weight:700;color:var(--text3);flex-shrink:0;width:52px}
.mi-author{font-size:calc(12px * var(--fs));font-weight:700;color:var(--accent);flex-shrink:0;width:30px}
.mi-text{flex:1;font-size:calc(13px * var(--fs));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.more-btn{
  display:flex;align-items:center;justify-content:center;
  margin:4px 12px 8px;padding:9px;
  background:var(--surface);border:1px dashed var(--border);
  border-radius:10px;font-size:calc(12px * var(--fs));font-weight:700;
  color:var(--text2);cursor:pointer;
}
#memo-form-area{
  flex-shrink:0;border-top:2px solid var(--border);
  background:var(--surface);padding:8px 0 6px;
}
.memo-form-title{font-size:calc(12px * var(--fs));font-weight:700;color:var(--text3);padding:0 14px 6px}
#memo-content-input{
  width:calc(100% - 28px);margin:0 14px;
  border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;font-family:'Noto Sans KR',sans-serif;
  font-size:calc(13px * var(--fs));color:var(--text);
  background:var(--surface2);outline:none;resize:none;height:44px;
}
.memo-meta-row{display:flex;gap:8px;align-items:center;padding:6px 14px}
.memo-date-input,.author-select{
  border:1px solid var(--border);border-radius:8px;
  padding:7px 8px;font-family:'Noto Sans KR',sans-serif;
  font-size:calc(12px * var(--fs));color:var(--text);
  background:var(--surface2);outline:none;
}
.memo-date-input{flex:1}
.memo-submit-btn{
  display:block;width:calc(100% - 28px);
  margin:0 14px;padding:11px;
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:calc(14px * var(--fs));font-weight:700;cursor:pointer;
}
.char-count{font-size:calc(11px * var(--fs));color:var(--text3);text-align:right;padding:2px 14px 0}
.char-count.warn{color:var(--red)}

/* 모달 */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  display:none;align-items:center;justify-content:center;
  z-index:100;padding:16px;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--surface);border-radius:16px;
  width:100%;max-width:380px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-header{
  padding:16px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:calc(16px * var(--fs));font-weight:900}
.modal-close{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--text2);
}
.modal-body{padding:12px 0}
.modal-footer{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border)}
.modal-btn{
  flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);
  font-family:'Noto Sans KR',sans-serif;
  font-size:calc(14px * var(--fs));font-weight:700;cursor:pointer;
}
.modal-btn.cancel{background:var(--surface2);color:var(--text2)}
.modal-btn.save{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-btn.del{background:var(--red-light);color:var(--red);border-color:var(--red)}

/* 토스트 */
#toast{
  position:fixed;bottom:70px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1a1a1a;color:#fff;
  padding:10px 20px;border-radius:20px;
  font-size:calc(13px * var(--fs));font-weight:700;
  opacity:0;transition:all 0.3s;z-index:200;
  white-space:nowrap;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 로딩 */
.loading-row{display:flex;align-items:center;justify-content:center;padding:30px;color:var(--text3);font-size:calc(13px * var(--fs));gap:8px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div id="app">

  <!-- 탑바 -->
  <div id="topbar">
    <div class="app-title">&#128230; <span>가족</span>편의점</div>
    <div class="top-actions">
      <div class="font-ctrl">
        <button id="font-minus">A-</button>
        <button id="font-plus">A+</button>
      </div>
      <div class="icon-btn" id="theme-btn">&#127769;</div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div id="content">

    <!-- 등록 탭 -->
    <div class="tab-panel active" id="tab-register">
      <div id="camera-area">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="scan-canvas" style="display:none"></canvas>
        <div id="cam-placeholder">
          <div class="ci">&#128247;</div>
          <p id="cam-placeholder-text">여기를 눌러서 카메라 촬영</p>
        </div>
        <div id="scan-overlay">
          <div class="scan-line"></div>
          <div class="sc tl"></div><div class="sc tr"></div>
          <div class="sc bl"></div><div class="sc br"></div>
        </div>
        <div id="scan-status"></div>
      </div>
      <div id="cam-btn-row">
        <button class="cam-btn green" id="capture-btn" style="display:none">&#128248; 촬영</button>
        <button class="cam-btn" id="stop-cam-btn" style="display:none">&#10005; 닫기</button>
        <button class="cam-btn" id="manual-btn">&#9999;&#65039; 직접입력</button>
      </div>
      <div id="register-form" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="card">
          <div class="form-row">
            <span class="form-label">등록일</span>
            <input type="date" class="form-input" id="reg-date">
          </div>
          <div class="form-row">
            <span class="form-label">바코드</span>
            <div id="barcode-display" class="form-input" style="color:var(--text3)">바코드를 촬영하거나 직접 입력</div>
            <input type="text" id="barcode-hidden" style="display:none">
          </div>
          <div class="form-row">
            <span class="form-label">제품명</span>
            <input type="text" class="form-input" id="reg-name" placeholder="제품명 입력">
          </div>
          <div class="form-row">
            <span class="form-label">수량</span>
            <div class="qty-ctrl">
              <button class="qty-btn" id="qty-minus">&#8722;</button>
              <input type="number" class="form-input" id="qty-input" value="1" min="1" max="999" style="width:50px;text-align:center;font-weight:700">
              <button class="qty-btn" id="qty-plus">&#43;</button>
            </div>
          </div>
        </div>
        <button class="btn-primary" id="reg-submit-btn">&#9989; 등록하기</button>
      </div>
    </div>

    <!-- 기록 탭 -->
    <div class="tab-panel" id="tab-records">
      <div id="records-list">
        <div class="loading-row"><div class="spinner"></div> 불러오는 중...</div>
      </div>
    </div>

    <!-- 공유메모 탭 -->
    <div class="tab-panel" id="tab-memos">
      <div id="memos-scroll">
        <p class="sec-title">&#128203; 공유메모</p>
        <div id="memos-list">
          <div class="loading-row"><div class="spinner"></div> 불러오는 중...</div>
        </div>
        <button class="more-btn" id="more-btn" style="display:none">더 보기 &#9660;</button>
      </div>
      <div id="memo-form-area">
        <p class="memo-form-title">메모 등록</p>
        <div class="memo-meta-row">
          <input type="date" class="memo-date-input" id="memo-date">
          <select class="author-select" id="memo-author">
            <option>아빠</option><option>엄마</option><option>강욱</option><option>진욱</option>
          </select>
        </div>
        <textarea id="memo-content-input" placeholder="메모 내용 (최대 50자)" maxlength="50"></textarea>
        <p class="char-count" id="char-count">0 / 50</p>
        <div style="padding:6px 0 0">
          <button class="memo-submit-btn" id="memo-submit-btn">메모 등록</button>
        </div>
      </div>
    </div>

  </div>

  <!-- 탭 바 -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="register"><span class="ti">&#128221;</span>등록</button>
    <button class="tab-btn" data-tab="records"><span class="ti">&#128203;</span>기록</button>
    <button class="tab-btn" data-tab="memos"><span class="ti">&#128172;</span>공유메모</button>
  </div>
</div>

<!-- 수정 모달 (기록) -->
<div class="modal-overlay" id="modal-record">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">기록 수정</span>
      <div class="modal-close" data-close="modal-record">&#10005;</div>
    </div>

<!-- BarcodeDetector API 사용 - 안드로이드 크롬 내장 -->
<script>
'use strict';

const API = 'https://script.google.com/macros/s/AKfycbx1_8hRq2I1RVGPQ0Ba5X9fs5roOgp21heuXxXVisg6H7iqq04iuV8R16QjfPgBNMTPGg/exec';

let allRecords = [], allMemos = [], products = {};
let editingRecord = null, editingMemo = null;
let cameraActive = false;
let fontScale = parseFloat(localStorage.getItem('fs') || '1');
let isDark = localStorage.getItem('theme') === 'dark';
let memosVisible = 7;

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', function() {
  applyTheme();
  applyFont();
  setToday('reg-date');
  setToday('memo-date');

  // 탭 버튼

  });

  // 탑바

  document.getElementById('font-minus').addEventListener('click', function() { changeFont(-1); });
  document.getElementById('font-plus').addEventListener('click', function() { changeFont(1); });

  // 등록 탭
  document.getElementById('camera-area').addEventListener('click', handleCamTap);
  document.getElementById('capture-btn').addEventListener('click', captureBarcode);
  document.getElementById('stop-cam-btn').addEventListener('click', stopCamera);
  document.getElementById('manual-btn').addEventListener('click', openManualModal);
  document.getElementById('qty-minus').addEventListener('click', function() { changeQty(-1); });
  document.getElementById('qty-plus').addEventListener('click', function() { changeQty(1); });
  document.getElementById('reg-submit-btn').addEventListener('click', submitRecord);

  // 기록 모달
  document.getElementById('btn-save-record').addEventListener('click', saveRecord);
  document.getElementById('btn-del-record').addEventListener('click', deleteRecord);

  // 메모 탭
  document.getElementById('memo-content-input').addEventListener('input', updateCharCount);
  document.getElementById('memo-submit-btn').addEventListener('click', submitMemo);
  document.getElementById('more-btn').addEventListener('click', loadMoreMemos);

  // 메모 모달
  document.getElementById('btn-save-memo').addEventListener('click', saveMemo);
  document.getElementById('btn-del-memo').addEventListener('click', deleteMemo);

  // 바코드 직접입력 모달
  document.getElementById('btn-apply-bc').addEventListener('click', applyManualBarcode);

  loadProducts();
  loadRecords();
  loadMemos();
});

/* ── 유틸 ── */
function today() { return new Date().toISOString().slice(0, 10); }
function setToday(id) { document.getElementById(id).value = today(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ── 테마/폰트 ── */
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme();
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').innerHTML = isDark ? '&#9728;&#65039;' : '&#127769;';
}
function changeFont(d) {
  fontScale = Math.round(Math.min(1.4, Math.max(0.7, fontScale + d * 0.1)) * 10) / 10;
  localStorage.setItem('fs', fontScale);
  applyFont();
}
function applyFont() {
  document.documentElement.style.setProperty('--fs', fontScale);
}

/* ── 탭 ── */
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var panel = document.getElementById('tab-' + name);
  var btn = document.querySelector('[data-tab="' + name + '"]');
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'records') loadRecords();
  if (name === 'memos') loadMemos();
  // 등록 후 다른 탭 갔다 돌아오면 새로고침
  if (name === 'register') { setToday('reg-date'); }
}

/* ── API (localStorage 캐시) ── */
var CACHE_MS = 30000; // 30초 캐시
function api(params) {
  var q = new URLSearchParams();
  Object.keys(params).forEach(function(k) { q.set(k, params[k]); });
  var url = API + '?' + q.toString();
  var isGet = params.action && params.action.startsWith('get');

  // GET 요청이면 캐시 확인
  if (isGet) {
    var cacheKey = 'cvs_' + params.action;
    try {
      var cached = localStorage.getItem(cacheKey);
      if (cached) {
        var obj = JSON.parse(cached);
        if (Date.now() - obj.ts < CACHE_MS) {
          return Promise.resolve(obj.data);
        }
      }
    } catch(e) {}
  }

  return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    // GET 결과 캐시에 저장
    if (isGet) {
      try { localStorage.setItem('cvs_' + params.action, JSON.stringify({ ts: Date.now(), data: data })); } catch(e) {}
    } else {
      // 쓰기 후 관련 캐시 삭제
      try {
        localStorage.removeItem('cvs_getRecords');
        localStorage.removeItem('cvs_getMemos');
        localStorage.removeItem('cvs_getProducts');
      } catch(e) {}
    }
    return data;
  });
}

/* ── 카메라 (BarcodeDetector API - 안드로이드 크롬 내장) ── */
var scanLoop = null;
var detector = null;

function handleCamTap(e) {
  if (!cameraActive) { toggleCamera(); }
}

function toggleCamera() {
  if (cameraActive) return;
  var area = document.getElementById('camera-area');
  var video = document.getElementById('video');

  // BarcodeDetector 지원 확인
  if (!('BarcodeDetector' in window)) {
    showToast('이 브라우저는 바코드 인식 미지원 - 직접 입력 사용');
    openManualModal();
    return;
  }

  // 카메라 켤 때 placeholder 초기화
  var ph = document.getElementById('cam-placeholder');
  ph.classList.remove('after-scan');
  ph.style.display = '';

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: 'environment' },
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  }).then(function(stream) {
    video.srcObject = stream;
    video.style.display = 'block';
    area.classList.add('active');
    cameraActive = true;
    document.getElementById('capture-btn').style.display = 'flex';
    document.getElementById('stop-cam-btn').style.display = 'flex';
    setScanStatus('스캔 중...');

    // 줌 적용
    setTimeout(function() {
      try {
        var track = stream.getVideoTracks()[0];
        var caps = track.getCapabilities ? track.getCapabilities() : {};
        if (caps.zoom) {
          var z = Math.min(caps.zoom.max, Math.max(caps.zoom.min, 1.5));
          track.applyConstraints({ advanced: [{ zoom: z }] }).catch(function(){});
        }
      } catch(e) {}
    }, 800);

    // BarcodeDetector 초기화
    detector = new BarcodeDetector({
      formats: ['ean_13', 'ean_8', 'code_128', 'upc_a', 'upc_e', 'code_39']
    });

    // 자동 스캔 루프 시작
    video.addEventListener('loadedmetadata', function() {
      startScanLoop(video);
    });

  }).catch(function() {
    showToast('카메라 권한이 필요해요');
  });
}

// 자릿수별 다수결로 최종 바코드 확정
function digitVoteMajority(candidates) {
  if (!candidates || candidates.length === 0) return null;
  var len = candidates[0].length;
  // 길이가 다른 건 제외
  candidates = candidates.filter(function(c) { return c.length === len; });
  if (candidates.length === 0) return null;
  var result = '';
  for (var i = 0; i < len; i++) {
    var freq = {};
    candidates.forEach(function(c) {
      var ch = c[i];
      freq[ch] = (freq[ch] || 0) + 1;
    });
    var best = Object.keys(freq).sort(function(a,b){ return freq[b]-freq[a]; })[0];
    result += best;
  }
  return result;
}

// 이미지 전처리 변형본 생성 (원본 포함 총 4가지)
function getCanvasVariants(srcCanvas) {
  var w = srcCanvas.width, h = srcCanvas.height;
  var variants = [srcCanvas];

  function makeVariant(transform) {
    var dst = document.createElement('canvas');
    dst.width = w; dst.height = h;
    var ctx = dst.getContext('2d');
    ctx.drawImage(srcCanvas, 0, 0);
    var imgData = ctx.getImageData(0, 0, w, h);
    var d = imgData.data;
    for (var i = 0; i < d.length; i += 4) {
      var gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
      var val = transform(gray);
      d[i] = d[i+1] = d[i+2] = Math.min(255, Math.max(0, val));
    }
    ctx.putImageData(imgData, 0, 0);
    return dst;
  }

  // 대비 1.8배
  variants.push(makeVariant(function(g){ return (g-128)*1.8+128; }));
  // 대비 2.4배 (강하게)
  variants.push(makeVariant(function(g){ return (g-128)*2.4+128; }));
  // 반전 (흰 바코드 대응)
  variants.push(makeVariant(function(g){ return 255-g; }));

  return variants;
}

function startScanLoop(video) {
  var canvas = document.getElementById('scan-canvas');
  var ctx = canvas.getContext('2d');
  var frameCount = 0;
  var collected = []; // 수집된 후보들
  var CONFIRM_COUNT = 5; // 5개 수집 후 자릿수 다수결

  function scan() {
    if (!cameraActive || !detector) return;
    frameCount++;

    if (frameCount % 2 === 0 && video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      var variants = getCanvasVariants(canvas);

      // 모든 variant에 대해 순서대로 detect 시도
      var detectChain = Promise.resolve(null);
      variants.forEach(function(v) {
        detectChain = detectChain.then(function(found) {
          if (found) return found; // 이미 찾았으면 스킵
          return detector.detect(v).then(function(b) {
            return (b && b.length > 0 && b[0].rawValue) ? b[0].rawValue : null;
          }).catch(function(){ return null; });
        });
      });

      detectChain.then(function(code) {
        if (code && code.length >= 8) {
          collected.push(code);
          setScanStatus('스캔 중... (' + collected.length + '/' + CONFIRM_COUNT + ')');

          if (collected.length >= CONFIRM_COUNT) {
            // 자릿수별 다수결로 최종 확정
            var final = digitVoteMajority(collected);
            if (final) {
              setBarcode(final);
              stopCamera();
              showToast('바코드 인식 완료!');
              return;
            }
            // 다수결 실패면 초기화하고 재시도
            collected = [];
          }
        } else {
          if (collected.length === 0) setScanStatus('스캔 중...');
        }
        scanLoop = requestAnimationFrame(scan);
      }).catch(function() {
        scanLoop = requestAnimationFrame(scan);
      });
    } else {
      scanLoop = requestAnimationFrame(scan);
    }
  }

  scanLoop = requestAnimationFrame(scan);
}

function captureBarcode() {
  var video = document.getElementById('video');
  if (!video.srcObject || !detector) { showToast('카메라를 먼저 켜줘'); return; }

  if (scanLoop) { cancelAnimationFrame(scanLoop); scanLoop = null; }

  var canvas = document.getElementById('scan-canvas');
  var ctx = canvas.getContext('2d');
  var results = [];
  var attempts = 0;
  var maxAttempts = 10;

  function tryScan() {
    if (attempts >= maxAttempts) {
      if (results.length === 0) {
        setScanStatus('스캔 중...');
        startScanLoop(video);
        showToast('인식 실패 - 더 가까이 대봐');
        return;
      }
      // 자릿수별 다수결로 최종 확정
      var final = digitVoteMajority(results);
      if (final) {
        setBarcode(final);
        stopCamera();
        showToast('바코드 인식 완료!');
      } else {
        setScanStatus('스캔 중...');
        startScanLoop(video);
        showToast('인식 실패 - 다시 시도해줘');
      }
      return;
    }
    attempts++;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    setScanStatus('촬영 중... (' + attempts + '/' + maxAttempts + ')');

    var variants = getCanvasVariants(canvas);
    var chain = Promise.resolve(null);
    variants.forEach(function(v) {
      chain = chain.then(function(found) {
        if (found) return found;
        return detector.detect(v).then(function(b) {
          return (b && b.length > 0 && b[0].rawValue) ? b[0].rawValue : null;
        }).catch(function(){ return null; });
      });
    });
    chain.then(function(code) {
      if (code && code.length >= 8) results.push(code);
      setTimeout(tryScan, 60);
    }).catch(function() { setTimeout(tryScan, 60); });
  }

  tryScan();
}

function setScanStatus(msg) {
  var el = document.getElementById('scan-status');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function stopCamera() {
  if (scanLoop) { cancelAnimationFrame(scanLoop); scanLoop = null; }
  detector = null;
  var video = document.getElementById('video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(function(t) { t.stop(); });
    video.srcObject = null;
  }
  document.getElementById('camera-area').classList.remove('active');
  cameraActive = false;
  document.getElementById('capture-btn').style.display = 'none';
  document.getElementById('stop-cam-btn').style.display = 'none';
  setScanStatus('');
  // placeholder "다시 촬영하기"로 변경
  var ph = document.getElementById('cam-placeholder');
  var txt = document.getElementById('cam-placeholder-text');
  ph.classList.add('after-scan');
  ph.style.display = 'flex';
  if (txt) txt.textContent = '다시 촬영하기';
  document.querySelector('#cam-placeholder .ci').textContent = '📷';
}

function setBarcode(code) {
  document.getElementById('barcode-hidden').value = code;
  var el = document.getElementById('barcode-display');
  el.style.color = '';
  if (code.length >= 6) {
    var p1 = esc(code.slice(0, 3));
    var mid = esc(code.slice(3, -3));
    var p2 = esc(code.slice(-3));
    el.innerHTML = '<span class="bc-red">' + p1 + '</span>' + mid + '<span class="bc-red">' + p2 + '</span>';
  } else {
    el.textContent = code;
  }
  if (products[code]) document.getElementById('reg-name').value = products[code];
}

function openManualModal() {
  stopCamera();
  openModal('modal-barcode');
  setTimeout(function() { document.getElementById('manual-bc-input').focus(); }, 100);
}

function applyManualBarcode() {
  var val = document.getElementById('manual-bc-input').value.trim();
  if (!val) { showToast('바코드를 입력해줘'); return; }
  setBarcode(val);
  closeModal('modal-barcode');
  document.getElementById('manual-bc-input').value = '';
}

function changeQty(d) {
  var inp = document.getElementById('qty-input');
  inp.value = Math.max(1, (parseInt(inp.value) || 1) + d);
}

/* ── 등록 ── */
function submitRecord() {
  var date = document.getElementById('reg-date').value;
  var barcode = document.getElementById('barcode-hidden').value.trim();
  var name = document.getElementById('reg-name').value.trim();
  var qty = parseInt(document.getElementById('qty-input').value) || 1;
  if (!date) { showToast('날짜를 입력해줘'); return; }
  if (!barcode && !name) { showToast('바코드 또는 제품명을 입력해줘'); return; }
  var btn = document.getElementById('reg-submit-btn');
  btn.disabled = true; btn.textContent = '등록 중...';
  api({ action: 'addRecord', 등록일: date, 바코드: barcode, 제품명: name, 수량: qty })
    .then(function() {
      showToast('등록 완료!');
      document.getElementById('barcode-hidden').value = '';
      document.getElementById('barcode-display').textContent = '바코드를 촬영하거나 직접 입력';
      document.getElementById('barcode-display').style.color = 'var(--text3)';
      document.getElementById('reg-name').value = '';
      document.getElementById('qty-input').value = '1';
      setToday('reg-date');
      loadProducts();
    })
    .catch(function() { showToast('등록 실패 - 다시 시도해줘'); })
    .finally(function() { btn.disabled = false; btn.textContent = '✅ 등록하기'; });
}

/* ── Products DB ── */
function loadProducts() {
  api({ action: 'getProducts' }).then(function(data) {
    products = {};
    (data || []).forEach(function(p) { if (p.바코드) products[p.바코드] = p.제품명; });
  }).catch(function(){});
}

/* ── 기록 ── */
var recordsLoaded = false;
function loadRecords(force) {
  var list = document.getElementById('records-list');
  // 캐시 데이터 있으면 즉시 표시
  try {
    var cached = localStorage.getItem('cvs_getRecords');
    if (cached && !force) {
      var obj = JSON.parse(cached);
      if (obj.data && obj.data.length) {
        allRecords = obj.data;
        renderRecords();
        // 캐시 만료됐으면 백그라운드 갱신
        if (Date.now() - obj.ts > 30000) refreshRecordsBg();
        return;
      }
    }
  } catch(e) {}
  list.innerHTML = '<div class="loading-row"><div class="spinner"></div> 불러오는 중...</div>';
  api({ action: 'getRecords' })
    .then(function(data) { allRecords = data || []; renderRecords(); })
    .catch(function() { list.innerHTML = '<div class="loading-row">불러오기 실패</div>'; });
}
function refreshRecordsBg() {
  fetch(API + '?action=getRecords').then(function(r) { return r.json(); }).then(function(data) {
    try { localStorage.setItem('cvs_getRecords', JSON.stringify({ ts: Date.now(), data: data })); } catch(e) {}
    allRecords = data || []; renderRecords();
  }).catch(function(){});
}

function renderRecords() {
  var list = document.getElementById('records-list');
  if (!allRecords.length) { list.innerHTML = '<div class="loading-row">기록이 없어</div>'; return; }
  var groups = {};
  allRecords.forEach(function(r) {
    var d = r['등록일'] || '날짜없음';
    if (!groups[d]) groups[d] = [];
    groups[d].push(r);
  });
  var dates = Object.keys(groups).sort(function(a,b) { return b.localeCompare(a); });
  var latest = dates[0];
  list.innerHTML = '';
  dates.forEach(function(date) {
    var items = groups[date];
    var isOpen = date === latest;
    var g = document.createElement('div'); g.className = 'date-group';
    var h = document.createElement('div'); h.className = 'date-header' + (isOpen ? ' open' : '');
    h.innerHTML = '<div class="dh-left"><span class="dh-date">' + esc(fmtDate(date)) + '</span><span class="dh-count">' + items.length + '개</span></div><span class="dh-arrow">&#9660;</span>';
    var body = document.createElement('div'); body.className = 'date-items' + (isOpen ? ' open' : '');
    items.forEach(function(r) {
      var row = document.createElement('div'); row.className = 'record-item';
      var bc = r['바코드'] || '';
      var bcHtml = bc.length >= 6 ? '<span class="bc-red">' + esc(bc.slice(0,3)) + '</span>···<span class="bc-red">' + esc(bc.slice(-3)) + '</span>' : esc(bc);
      row.innerHTML = '<span class="ri-bc">' + bcHtml + '</span><span class="ri-name">' + esc(r['제품명'] || '-') + '</span><span class="ri-qty">' + (r['수량'] || 0) + '</span><button class="edit-btn">수정</button>';
      row.querySelector('.edit-btn').addEventListener('click', function() { openEditRecord(r); });
      body.appendChild(row);
    });
    h.addEventListener('click', function() { h.classList.toggle('open'); body.classList.toggle('open'); });
    g.appendChild(h); g.appendChild(body); list.appendChild(g);
  });
}

function fmtDate(d) {
  if (!d) return '';
  var str = String(d).trim();
  var nums = str.replace(/\D+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').split('-');
  if (nums.length < 3) return str;
  var y = parseInt(nums[0]), mo = parseInt(nums[1]), day = parseInt(nums[2]);
  if (isNaN(y) || isNaN(mo) || isNaN(day)) return str;
  var dt = new Date(y, mo - 1, day);
  if (isNaN(dt.getTime())) return str;
  var pad = function(n) { return n < 10 ? '0'+n : ''+n; };
  return y + '-' + pad(mo) + '-' + pad(day) + ' (' + ['일','월','화','수','목','금','토'][dt.getDay()] + ')';
}

function openEditRecord(r) {
  editingRecord = r;
  document.getElementById('edit-date').value = r['등록일'] || today();
  document.getElementById('edit-barcode').value = r['바코드'] || '';
  document.getElementById('edit-name').value = r['제품명'] || '';
  document.getElementById('edit-qty').value = r['수량'] || 1;
  openModal('modal-record');
}

function saveRecord() {
  if (!editingRecord) return;
  api({ action: 'updateRecord', _row: editingRecord._row,
    등록일: document.getElementById('edit-date').value,
    바코드: document.getElementById('edit-barcode').value,
    제품명: document.getElementById('edit-name').value,
    수량: parseInt(document.getElementById('edit-qty').value) || 1 })
    .then(function() { showToast('수정 완료!'); closeModal('modal-record'); loadRecords(); })
    .catch(function() { showToast('수정 실패'); });
}

function deleteRecord() {
  if (!editingRecord || !confirm('이 기록을 삭제할까?')) return;
  api({ action: 'deleteRecord', _row: editingRecord._row })
    .then(function() { showToast('삭제 완료!'); closeModal('modal-record'); loadRecords(); })
    .catch(function() { showToast('삭제 실패'); });
}

/* ── 메모 ── */
function loadMemos(force) {
  var list = document.getElementById('memos-list');
  try {
    var cached = localStorage.getItem('cvs_getMemos');
    if (cached && !force) {
      var obj = JSON.parse(cached);
      if (obj.data && obj.data.length) {
        allMemos = obj.data.sort(function(a,b) { return (b['등록일']||'').localeCompare(a['등록일']||''); });
        memosVisible = fontScale <= 0.8 ? 10 : 7;
        renderMemos();
        if (Date.now() - obj.ts > 30000) refreshMemosBg();
        return;
      }
    }
  } catch(e) {}
  list.innerHTML = '<div class="loading-row"><div class="spinner"></div> 불러오는 중...</div>';
  api({ action: 'getMemos' })
    .then(function(data) {
      allMemos = (data || []).sort(function(a,b) { return (b['등록일']||'').localeCompare(a['등록일']||''); });
      memosVisible = fontScale <= 0.8 ? 10 : 7;
      renderMemos();
    })
    .catch(function() { list.innerHTML = '<div class="loading-row">불러오기 실패</div>'; });
}
function refreshMemosBg() {
  fetch(API + '?action=getMemos').then(function(r) { return r.json(); }).then(function(data) {
    try { localStorage.setItem('cvs_getMemos', JSON.stringify({ ts: Date.now(), data: data })); } catch(e) {}
    allMemos = (data || []).sort(function(a,b) { return (b['등록일']||'').localeCompare(a['등록일']||''); });
    renderMemos();
  }).catch(function(){});
}

function renderMemos() {
  var list = document.getElementById('memos-list');
  var moreBtn = document.getElementById('more-btn');
  list.innerHTML = '';
  if (!allMemos.length) { list.innerHTML = '<div class="loading-row">메모가 없어</div>'; moreBtn.style.display = 'none'; return; }
  allMemos.slice(0, memosVisible).forEach(function(m) {
    var el = document.createElement('div'); el.className = 'memo-item';
    el.innerHTML = '<span class="mi-date">' + esc(shortDate(m['등록일'])) + '</span><span class="mi-author">' + esc(m['등록자']||'') + '</span><span class="mi-text">' + esc(m['메모']||'') + '</span><button class="edit-btn">수정</button>';
    el.querySelector('.edit-btn').addEventListener('click', function() { openEditMemo(m); });
    list.appendChild(el);
  });
  var rem = allMemos.length - memosVisible;
  if (rem > 0) { moreBtn.style.display = 'flex'; moreBtn.textContent = '더 보기 (' + rem + '개) ▾'; }
  else { moreBtn.style.display = 'none'; }
}

function loadMoreMemos() { memosVisible += 10; renderMemos(); }

function shortDate(d) {
  if (!d) return '';
  // 다양한 형식 처리: "2026-04-30", "2026. 04. 30.", "2026/04/30" 등
  var str = String(d).trim();
  // 숫자만 뽑아서 연/월/일 파싱
  var nums = str.replace(/\D+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '').split('-');
  if (nums.length < 3) return str;
  var y = parseInt(nums[0]), mo = parseInt(nums[1]), day = parseInt(nums[2]);
  if (isNaN(y) || isNaN(mo) || isNaN(day)) return str;
  var dt = new Date(y, mo - 1, day);
  if (isNaN(dt.getTime())) return str;
  return mo + '/' + day + '(' + ['일','월','화','수','목','금','토'][dt.getDay()] + ')';
}

function updateCharCount() {
  var len = document.getElementById('memo-content-input').value.length;
  var cc = document.getElementById('char-count');
  cc.textContent = len + ' / 50';
  cc.className = 'char-count' + (len >= 45 ? ' warn' : '');
}

function submitMemo() {
  var date = document.getElementById('memo-date').value;
  var author = document.getElementById('memo-author').value;
  var content = document.getElementById('memo-content-input').value.trim();
  if (!content) { showToast('메모 내용을 입력해줘'); return; }
  api({ action: 'addMemo', 등록일: date, 등록자: author, 메모: content })
    .then(function() {
      showToast('메모 등록 완료!');
      document.getElementById('memo-content-input').value = '';
      updateCharCount(); loadMemos();
    })
    .catch(function() { showToast('등록 실패'); });
}

function openEditMemo(m) {
  editingMemo = m;
  document.getElementById('edit-memo-date').value = m['등록일'] || today();
  document.getElementById('edit-memo-author').value = m['등록자'] || '아빠';
  document.getElementById('edit-memo-text').value = m['메모'] || '';
  openModal('modal-memo');
}

function saveMemo() {
  if (!editingMemo) return;
  api({ action: 'updateMemo', _row: editingMemo._row,
    등록일: document.getElementById('edit-memo-date').value,
    등록자: document.getElementById('edit-memo-author').value,
    메모: document.getElementById('edit-memo-text').value })
    .then(function() { showToast('수정 완료!'); closeModal('modal-memo'); loadMemos(); })
    .catch(function() { showToast('수정 실패'); });
}

function deleteMemo() {
  if (!editingMemo || !confirm('이 메모를 삭제할까?')) return;
  api({ action: 'deleteMemo', _row: editingMemo._row })
    .then(function() { showToast('삭제 완료!'); closeModal('modal-memo'); loadMemos(); })
    .catch(function() { showToast('삭제 실패'); });
}
</script>
